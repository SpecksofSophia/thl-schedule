<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coverage Schedule — SHIELD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
    --ink: #0c0f14;
    --paper: #f4f1ec;
    --paper-warm: #ece8e0;
    --rule: #c8c1b4;
    --dim: #8a8279;
    --thl: #1a5e3a;
    --thl-bg: #e8f3ed;
    --thl-border: #b8d9c6;
    --lthl: #5e3a1a;
    --lthl-bg: #f3ece8;
    --lthl-border: #d9c6b8;
    --accent: #c43d2e;
    --staff-may: #2d6a9f;
    --staff-ricca: #7b3fa0;
    --staff-mae: #3a8a6e;
    --staff-jaz: #c26d2a;
    --staff-mele: #6b4c8a;
    --staff-lucia: #2a7a8a;
    --staff-christina: #a03f5e;
    --staff-celia: #8a6b3d;
    --staff-araceli: #4a7a3a;
    --staff-ed: #5a6a8a;
    --staff-brenda: #8a3a5a;
    --staff-lara: #c43d2e;
    --staff-isabel: #3d6a9a;
    --staff-linda: #7a5a3a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
}

/* Noise texture overlay */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
}

.page { max-width: 1400px; margin: 0 auto; padding: 28px 32px 40px; }

/* Header */
.header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 3px solid var(--ink);
    padding-bottom: 12px;
    margin-bottom: 6px;
    animation: fadeDown 0.5s ease-out;
}
@keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }

.header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
}
.header h1 span { color: var(--accent); }

.header-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    text-align: right;
    line-height: 1.6;
}

/* Sub-header with facility tags */
.sub-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0 16px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 20px;
    animation: fadeDown 0.5s ease-out 0.1s both;
}
.facility-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
}
.facility-tag.thl { background: var(--thl-bg); color: var(--thl); border: 1px solid var(--thl-border); }
.facility-tag.lthl { background: var(--lthl-bg); color: var(--lthl); border: 1px solid var(--lthl-border); }
.facility-tag::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
}
.week-label {
    margin-left: auto;
    font-size: 13px;
    color: var(--dim);
    font-weight: 500;
}
.print-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
}
.print-btn:hover { opacity: 0.8; }

/* Calendar Grid */
.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    border: 2px solid var(--ink);
    animation: fadeUp 0.5s ease-out 0.2s both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

.day-col {
    border-right: 1px solid var(--rule);
    min-height: 420px;
    display: flex;
    flex-direction: column;
}
.day-col:last-child { border-right: none; }
.day-col.today { background: rgba(196, 61, 46, 0.03); }

.day-header {
    padding: 10px 10px 8px;
    border-bottom: 2px solid var(--ink);
    text-align: center;
    background: var(--ink);
    color: var(--paper);
    position: sticky;
    top: 0;
}
.day-header .day-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.7;
}
.day-header .day-date {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
}
.day-col.today .day-header {
    background: var(--accent);
}

/* Facility sections within a day */
.facility-section {
    padding: 6px 6px 4px;
    flex: 1;
}
.facility-section + .facility-section {
    border-top: 1px dashed var(--rule);
}
.facility-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 6px;
    margin-bottom: 4px;
    display: inline-block;
}
.facility-label.thl { color: var(--thl); background: var(--thl-bg); }
.facility-label.lthl { color: var(--lthl); background: var(--lthl-bg); }

/* Shift blocks */
.shift {
    padding: 5px 7px;
    margin-bottom: 3px;
    border-left: 3px solid var(--dim);
    background: #fff;
    border-radius: 0 3px 3px 0;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
}
.shift:hover {
    transform: translateX(2px);
    box-shadow: -2px 2px 8px rgba(0,0,0,0.08);
    z-index: 2;
}
.shift-name {
    font-size: 11.5px;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.shift-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    color: var(--dim);
    margin-top: 1px;
}
.shift-note {
    font-size: 9px;
    color: var(--dim);
    font-style: italic;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.shift-hours {
    position: absolute;
    top: 5px;
    right: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    opacity: 0.5;
}

/* Staff colors */
.staff-may { border-left-color: var(--staff-may); }
.staff-may .shift-name { color: var(--staff-may); }
.staff-ricca { border-left-color: var(--staff-ricca); }
.staff-ricca .shift-name { color: var(--staff-ricca); }
.staff-mae { border-left-color: var(--staff-mae); }
.staff-mae .shift-name { color: var(--staff-mae); }
.staff-jaz { border-left-color: var(--staff-jaz); }
.staff-jaz .shift-name { color: var(--staff-jaz); }
.staff-mele { border-left-color: var(--staff-mele); }
.staff-mele .shift-name { color: var(--staff-mele); }
.staff-lucia { border-left-color: var(--staff-lucia); }
.staff-lucia .shift-name { color: var(--staff-lucia); }
.staff-christina { border-left-color: var(--staff-christina); }
.staff-christina .shift-name { color: var(--staff-christina); }
.staff-celia { border-left-color: var(--staff-celia); }
.staff-celia .shift-name { color: var(--staff-celia); }
.staff-araceli { border-left-color: var(--staff-araceli); }
.staff-araceli .shift-name { color: var(--staff-araceli); }
.staff-ed { border-left-color: var(--staff-ed); }
.staff-ed .shift-name { color: var(--staff-ed); }
.staff-brenda { border-left-color: var(--staff-brenda); }
.staff-brenda .shift-name { color: var(--staff-brenda); }

/* Summary bar */
.summary {
    display: flex;
    gap: 0;
    margin-top: 16px;
    border: 2px solid var(--ink);
    animation: fadeUp 0.5s ease-out 0.35s both;
}
.summary-item {
    flex: 1;
    padding: 10px 14px;
    border-right: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 10px;
}
.summary-item:last-child { border-right: none; }
.summary-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
}
.summary-name {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
}
.summary-hours {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-left: auto;
}

/* Print */
@media print {
    body::before { display: none; }
    .print-btn { display: none !important; }
    body { background: #fff; }
    .page { padding: 0; max-width: none; }
    .calendar { page-break-inside: avoid; }
    .shift:hover { transform: none; box-shadow: none; }
    @page { size: landscape; margin: 0.4in; }
    .summary { page-break-inside: avoid; }
    .day-col { min-height: auto; }
}
</style>
</head>
<body>
<div class="page">
    <div class="header">
        <h1>Coverage <span>Schedule</span></h1>
        <div class="header-meta">
            SHIELD — Staffing Operations<br>
            Generated <span id="gen-date"></span>
        </div>
    </div>
    <div class="sub-header">
        <div class="facility-tag thl">THL — RCFE</div>
        <div class="facility-tag lthl">LTHL — ARF</div>
        <div class="week-label" id="week-label"></div>
        <button class="print-btn" onclick="window.print()">PRINT</button>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="summary" id="summary"></div>
</div>

<script>
// SCHEDULE DATA — embedded from schedule.json
const SCHEDULE = [{"date":"2026-03-09","day":"Mon","facility":"THL","shift":"Morning","staff":"May Rioflorido","start":"07:00","end":"15:00","hours":8,"notes":"Covering for Lara (Phase 1)"},{"date":"2026-03-09","day":"Mon","facility":"THL","shift":"Afternoon","staff":"Ricca Ilagan","start":"15:00","end":"23:00","hours":8,"notes":"Backup Lead"},{"date":"2026-03-09","day":"Mon","facility":"THL","shift":"Overnight","staff":"Mele Langa","start":"23:00","end":"07:00","hours":8,"notes":""},{"date":"2026-03-09","day":"Mon","facility":"LTHL","shift":"Day","staff":"Celia Bugayong","start":"07:00","end":"19:00","hours":12,"notes":"Live-in"},{"date":"2026-03-09","day":"Mon","facility":"LTHL","shift":"Day","staff":"Araceli Abauto","start":"08:00","end":"16:00","hours":8,"notes":"Weekday coverage"},{"date":"2026-03-10","day":"Tue","facility":"THL","shift":"Morning","staff":"May Rioflorido","start":"07:00","end":"15:00","hours":8,"notes":"Covering for Lara"},{"date":"2026-03-10","day":"Tue","facility":"THL","shift":"Morning","staff":"Mae Maglalang","start":"09:00","end":"16:00","hours":7,"notes":"Tue-Thu schedule"},{"date":"2026-03-10","day":"Tue","facility":"THL","shift":"Afternoon","staff":"Jaz Cafuir","start":"15:00","end":"23:00","hours":8,"notes":""},{"date":"2026-03-10","day":"Tue","facility":"THL","shift":"Overnight","staff":"Lucia Senoron","start":"23:00","end":"07:00","hours":8,"notes":""},{"date":"2026-03-10","day":"Tue","facility":"LTHL","shift":"Day","staff":"Celia Bugayong","start":"07:00","end":"19:00","hours":12,"notes":"Live-in"},{"date":"2026-03-10","day":"Tue","facility":"LTHL","shift":"Day","staff":"Araceli Abauto","start":"08:00","end":"16:00","hours":8,"notes":"Weekday coverage"},{"date":"2026-03-11","day":"Wed","facility":"THL","shift":"Morning","staff":"May Rioflorido","start":"07:00","end":"15:00","hours":8,"notes":"Covering for Lara"},{"date":"2026-03-11","day":"Wed","facility":"THL","shift":"Morning","staff":"Mae Maglalang","start":"09:00","end":"16:00","hours":7,"notes":"Tue-Thu schedule"},{"date":"2026-03-11","day":"Wed","facility":"THL","shift":"Afternoon","staff":"Ricca Ilagan","start":"15:00","end":"23:00","hours":8,"notes":""},{"date":"2026-03-11","day":"Wed","facility":"THL","shift":"Overnight","staff":"Mele Langa","start":"23:00","end":"07:00","hours":8,"notes":""},{"date":"2026-03-11","day":"Wed","facility":"LTHL","shift":"Day","staff":"Celia Bugayong","start":"07:00","end":"19:00","hours":12,"notes":"Live-in"},{"date":"2026-03-11","day":"Wed","facility":"LTHL","shift":"Day","staff":"Araceli Abauto","start":"08:00","end":"16:00","hours":8,"notes":"Weekday coverage"},{"date":"2026-03-12","day":"Thu","facility":"THL","shift":"Morning","staff":"May Rioflorido","start":"07:00","end":"15:00","hours":8,"notes":"Covering for Lara"},{"date":"2026-03-12","day":"Thu","facility":"THL","shift":"Morning","staff":"Mae Maglalang","start":"09:00","end":"16:00","hours":7,"notes":"Tue-Thu schedule"},{"date":"2026-03-12","day":"Thu","facility":"THL","shift":"Afternoon","staff":"Jaz Cafuir","start":"15:00","end":"23:00","hours":8,"notes":""},{"date":"2026-03-12","day":"Thu","facility":"THL","shift":"Overnight","staff":"Lucia Senoron","start":"23:00","end":"07:00","hours":8,"notes":""},{"date":"2026-03-12","day":"Thu","facility":"LTHL","shift":"Day","staff":"Celia Bugayong","start":"07:00","end":"19:00","hours":12,"notes":"Live-in"},{"date":"2026-03-12","day":"Thu","facility":"LTHL","shift":"Day","staff":"Araceli Abauto","start":"08:00","end":"16:00","hours":8,"notes":"Weekday coverage"},{"date":"2026-03-13","day":"Fri","facility":"THL","shift":"Morning","staff":"May Rioflorido","start":"07:00","end":"15:00","hours":8,"notes":"Covering for Lara"},{"date":"2026-03-13","day":"Fri","facility":"THL","shift":"Afternoon","staff":"Ricca Ilagan","start":"15:00","end":"23:00","hours":8,"notes":""},{"date":"2026-03-13","day":"Fri","facility":"THL","shift":"Overnight","staff":"Mele Langa","start":"23:00","end":"07:00","hours":8,"notes":""},{"date":"2026-03-13","day":"Fri","facility":"LTHL","shift":"Day","staff":"Celia Bugayong","start":"07:00","end":"19:00","hours":12,"notes":"Live-in"},{"date":"2026-03-13","day":"Fri","facility":"LTHL","shift":"Day","staff":"Araceli Abauto","start":"08:00","end":"16:00","hours":8,"notes":"Weekday coverage"},{"date":"2026-03-14","day":"Sat","facility":"THL","shift":"Morning","staff":"Christina","start":"10:00","end":"22:00","hours":12,"notes":"Full-time transition"},{"date":"2026-03-14","day":"Sat","facility":"THL","shift":"Overnight","staff":"Lucia Senoron","start":"22:00","end":"07:00","hours":9,"notes":"Weekend"},{"date":"2026-03-14","day":"Sat","facility":"LTHL","shift":"Day","staff":"Celia Bugayong","start":"07:00","end":"19:00","hours":12,"notes":"Live-in"},{"date":"2026-03-14","day":"Sat","facility":"LTHL","shift":"Day","staff":"Ed Belisario","start":"08:00","end":"16:00","hours":8,"notes":"Weekend"},{"date":"2026-03-14","day":"Sat","facility":"LTHL","shift":"Day","staff":"Brenda Ceralde","start":"08:00","end":"16:00","hours":8,"notes":"Saturdays"},{"date":"2026-03-15","day":"Sun","facility":"THL","shift":"Morning","staff":"Christina","start":"10:00","end":"22:00","hours":12,"notes":"Full-time transition"},{"date":"2026-03-15","day":"Sun","facility":"THL","shift":"Overnight","staff":"Mele Langa","start":"22:00","end":"07:00","hours":9,"notes":""},{"date":"2026-03-15","day":"Sun","facility":"LTHL","shift":"Day","staff":"Celia Bugayong","start":"07:00","end":"19:00","hours":12,"notes":"Live-in"},{"date":"2026-03-15","day":"Sun","facility":"LTHL","shift":"Day","staff":"Ed Belisario","start":"08:00","end":"16:00","hours":8,"notes":"Weekend"}];

// Staff → CSS class mapping
function staffClass(name) {
    const first = name.toLowerCase().split(' ')[0];
    const map = { may:'may', ricca:'ricca', mae:'mae', jaz:'jaz', jaznifer:'jaz',
        mele:'mele', carmelita:'mele', lucia:'lucia', christina:'christina',
        celia:'celia', araceli:'araceli', ed:'ed', brenda:'brenda',
        lara:'lara', isabel:'isabel', linda:'linda', jossen:'mae', anthony:'may' };
    return 'staff-' + (map[first] || 'may');
}

// Staff color for summary dot
function staffColor(name) {
    const cls = staffClass(name);
    const el = document.createElement('div');
    el.className = 'shift ' + cls;
    document.body.appendChild(el);
    const c = getComputedStyle(el).borderLeftColor;
    document.body.removeChild(el);
    return c;
}

function render() {
    // Get unique sorted dates
    const dates = [...new Set(SCHEDULE.map(s => s.date))].sort();
    const dayNames = { Mon:'MON', Tue:'TUE', Wed:'WED', Thu:'THU', Fri:'FRI', Sat:'SAT', Sun:'SUN' };
    const today = new Date().toISOString().split('T')[0];

    document.getElementById('gen-date').textContent = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

    if (dates.length > 0) {
        const s = new Date(dates[0] + 'T00:00:00');
        const e = new Date(dates[dates.length-1] + 'T00:00:00');
        document.getElementById('week-label').textContent =
            s.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ' — ' +
            e.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }

    const cal = document.getElementById('calendar');
    const staffHours = {};

    dates.forEach((date, idx) => {
        const shifts = SCHEDULE.filter(s => s.date === date);
        const dayEntry = shifts[0];
        const isToday = date === today;
        const dt = new Date(date + 'T00:00:00');
        const dayNum = dt.getDate();
        const dayName = dayEntry ? dayEntry.day : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()];

        const col = document.createElement('div');
        col.className = 'day-col' + (isToday ? ' today' : '');
        col.style.animationDelay = (0.05 * idx) + 's';

        col.innerHTML = `<div class="day-header">
            <div class="day-name">${dayNames[dayName] || dayName.toUpperCase()}</div>
            <div class="day-date">${dayNum}</div>
        </div>`;

        // THL shifts
        const thlShifts = shifts.filter(s => s.facility === 'THL');
        const lthlShifts = shifts.filter(s => s.facility === 'LTHL');

        if (thlShifts.length) {
            const sec = document.createElement('div');
            sec.className = 'facility-section';
            sec.innerHTML = '<div class="facility-label thl">THL</div>';
            thlShifts.forEach(s => {
                staffHours[s.staff] = (staffHours[s.staff] || 0) + s.hours;
                sec.innerHTML += `<div class="shift ${staffClass(s.staff)}">
                    <div class="shift-name">${s.staff.split(' ')[0]}</div>
                    <div class="shift-time">${s.start}–${s.end}</div>
                    ${s.notes ? `<div class="shift-note">${s.notes}</div>` : ''}
                    <div class="shift-hours">${s.hours}h</div>
                </div>`;
            });
            col.appendChild(sec);
        }

        if (lthlShifts.length) {
            const sec = document.createElement('div');
            sec.className = 'facility-section';
            sec.innerHTML = '<div class="facility-label lthl">LTHL</div>';
            lthlShifts.forEach(s => {
                staffHours[s.staff] = (staffHours[s.staff] || 0) + s.hours;
                sec.innerHTML += `<div class="shift ${staffClass(s.staff)}">
                    <div class="shift-name">${s.staff.split(' ')[0]}</div>
                    <div class="shift-time">${s.start}–${s.end}</div>
                    ${s.notes ? `<div class="shift-note">${s.notes}</div>` : ''}
                    <div class="shift-hours">${s.hours}h</div>
                </div>`;
            });
            col.appendChild(sec);
        }

        cal.appendChild(col);
    });

    // Summary
    const sum = document.getElementById('summary');
    const sorted = Object.entries(staffHours).sort((a,b) => b[1] - a[1]);
    sorted.forEach(([name, hrs]) => {
        const color = getComputedStyle(document.documentElement).getPropertyValue('--' + staffClass(name).replace('staff-','staff-'));
        sum.innerHTML += `<div class="summary-item">
            <div class="summary-dot" style="background:var(--${staffClass(name).replace('staff-','staff-')})"></div>
            <div class="summary-name">${name}</div>
            <div class="summary-hours">${hrs}h</div>
        </div>`;
    });
}

render();
</script>
</body>
</html>
