<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>D is for...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Avenir', 'Helvetica Neue', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .letter-header {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    opacity: 0.6;
    margin-bottom: 20px;
    letter-spacing: 4px;
  }
  .card-container {
    position: relative;
    width: 320px;
    height: 420px;
    perspective: 1000px;
  }
  .card {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .card.hidden { display: none; }

  .card .big-letter {
    font-size: 180px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .card .tap-hint {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    margin-top: 20px;
    animation: pulse 2s infinite;
  }
  .card .emoji {
    font-size: 120px;
    line-height: 1;
    margin-bottom: 10px;
  }
  .card .word {
    font-size: 56px;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 3px 12px rgba(0,0,0,0.3);
  }
  .card .sub {
    font-size: 20px;
    color: rgba(255,255,255,0.7);
    margin-top: 8px;
    font-weight: 500;
  }

  /* Card colors */
  .card-prompt { background: linear-gradient(145deg, #e94560, #c23152); }
  .card-dog { background: linear-gradient(145deg, #f59e0b, #d97706); }
  .card-duck { background: linear-gradient(145deg, #10b981, #059669); }
  .card-daddy { background: linear-gradient(145deg, #6366f1, #4f46e5); }

  /* Reveal animation */
  .card.reveal {
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card.exit {
    animation: slideOut 0.35s ease-in forwards;
  }

  @keyframes popIn {
    0% { transform: scale(0.7) rotateY(-15deg); opacity: 0; }
    100% { transform: scale(1) rotateY(0); opacity: 1; }
  }
  @keyframes slideOut {
    0% { transform: translateX(0) rotate(0); opacity: 1; }
    100% { transform: translateX(300px) rotate(15deg); opacity: 0; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .dots {
    display: flex;
    gap: 10px;
    margin-top: 30px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: all 0.3s;
  }
  .dot.active {
    background: #fff;
    transform: scale(1.3);
  }

  .restart {
    position: fixed;
    bottom: 40px;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    display: none;
  }
  .restart.show { display: block; }

  .confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="letter-header">TAP THE CARD</div>

<div class="card-container" id="container">
  <div class="card card-prompt" id="card-prompt" onclick="revealNext()">
    <div class="big-letter">D</div>
    <div class="tap-hint">tap!</div>
  </div>

  <div class="card card-dog hidden" id="card-0" onclick="nextCard()">
    <div class="emoji">&#x1F436;</div>
    <div class="word">Dog</div>
    <div class="sub">D is for Dog</div>
  </div>

  <div class="card card-duck hidden" id="card-1" onclick="nextCard()">
    <div class="emoji">&#x1F986;</div>
    <div class="word">Duck</div>
    <div class="sub">D is for Duck</div>
  </div>

  <div class="card card-daddy hidden" id="card-2" onclick="nextCard()">
    <div class="emoji">&#x1F468;&#x200D;&#x1F467;</div>
    <div class="word">Daddy</div>
    <div class="sub">D is for Daddy</div>
  </div>
</div>

<div class="dots">
  <div class="dot" id="dot-0"></div>
  <div class="dot" id="dot-1"></div>
  <div class="dot" id="dot-2"></div>
</div>

<div class="restart" id="restart" onclick="resetCards()">tap to start over</div>

<canvas class="confetti" id="confetti"></canvas>

<script>
let current = -1;
const total = 3;

function revealNext() {
  const prompt = document.getElementById('card-prompt');
  prompt.classList.add('exit');
  setTimeout(() => {
    prompt.style.display = 'none';
    current = 0;
    showCard(0);
  }, 300);
}

function showCard(i) {
  const card = document.getElementById('card-' + i);
  card.classList.remove('hidden');
  card.classList.remove('exit');
  card.classList.add('reveal');
  document.getElementById('dot-' + i).classList.add('active');

  if (i === total - 1) {
    setTimeout(() => celebrate(), 600);
  }
}

function nextCard() {
  if (current >= total - 1) return;
  const old = document.getElementById('card-' + current);
  old.classList.add('exit');
  setTimeout(() => {
    old.classList.add('hidden');
    old.classList.remove('reveal', 'exit');
    current++;
    showCard(current);
  }, 300);
}

function resetCards() {
  current = -1;
  for (let i = 0; i < total; i++) {
    const c = document.getElementById('card-' + i);
    c.classList.add('hidden');
    c.classList.remove('reveal', 'exit');
    document.getElementById('dot-' + i).classList.remove('active');
  }
  const prompt = document.getElementById('card-prompt');
  prompt.style.display = 'flex';
  prompt.classList.remove('exit');
  prompt.classList.add('reveal');
  document.getElementById('restart').classList.remove('show');
  clearCanvas();
}

// Confetti
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
let particles = [];
let animId = null;

function celebrate() {
  document.getElementById('restart').classList.add('show');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = [];
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      w: 6 + Math.random() * 6,
      h: 12 + Math.random() * 8,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rv: (Math.random() - 0.5) * 8,
      color: ['#e94560','#f59e0b','#10b981','#6366f1','#fff'][Math.floor(Math.random()*5)],
      life: 1
    });
  }
  animateConfetti();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  particles.forEach(p => {
    if (p.life <= 0) return;
    alive = true;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.rot += p.rv;
    if (p.y > canvas.height + 20) { p.life = 0; return; }
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  });
  if (alive) animId = requestAnimationFrame(animateConfetti);
}

function clearCanvas() {
  if (animId) cancelAnimationFrame(animId);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = [];
}
</script>
</body>
</html>
